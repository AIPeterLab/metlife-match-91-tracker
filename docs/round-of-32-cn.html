<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2026 世界杯 32 强对阵图</title>
  <style>
    body {
      margin: 0;
      background: #f5f7fb;
      color: #0f172a;
      font-family: "Microsoft YaHei", "Noto Sans CJK SC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      padding: 18px 16px 10px;
      background: white;
      border-bottom: 1px solid #d8e0ee;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 1.15rem;
      line-height: 1.3;
    }
    p {
      margin: 0;
      color: #475569;
      font-size: .92rem;
      line-height: 1.45;
    }
    .stage {
      padding: 12px;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }
    img {
      display: block;
      width: 1800px;
      max-width: none;
      height: auto;
      background: #f5f7fb;
    }
    .hint {
      padding: 10px 16px 18px;
      color: #64748b;
      font-size: .9rem;
    }
    a {
      color: #0369a1;
    }
  </style>
</head>
<body>
  <header>
    <h1>2026 世界杯 32 强对阵图（中文）</h1>
    <p>按最新刷新数据生成。手机上可横向滑动查看整张图。</p>
  </header>
  <main>
    <div class="stage">
      <img src="./round-of-32-cn.svg" alt="2026 世界杯 32 强中文对阵图">
    </div>
    <div class="hint">
      如果图片没有加载，可以直接打开 <a href="./round-of-32-cn.svg">SVG 原图</a>。
    </div>
  </main>
</body>
</html>
