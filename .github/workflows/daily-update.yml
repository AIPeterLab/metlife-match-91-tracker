name: Daily Match 91 Update

on:
  schedule:
    # 8:17 AM America/New_York during daylight time.
    # GitHub can delay or drop jobs at the top of the hour, so avoid :00.
    - cron: "17 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Regenerate tracker
        run: python scripts/update_tracker.py

      - name: Commit daily update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Daily Match 91 tracker update"
          file_pattern: "data/tracker.json docs/index.html docs/.nojekyll docs/reports/*.md reports/*.md"
