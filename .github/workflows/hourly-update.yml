name: Match 91 Tracker Update

on:
  schedule:
    # Native hourly trigger. An external watchdog dispatches this workflow if
    # GitHub's scheduled-event service does not create a run.
    - cron: "23 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: match-91-tracker-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Regenerate tracker
        run: python scripts/update_tracker.py

      - name: Commit tracker update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Hourly Match 91 tracker update"
          file_pattern: "data/tracker.json docs/index.html docs/.nojekyll docs/reports/*.md reports/*.md"
